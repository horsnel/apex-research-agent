# ---------------------------------------------------------------------------
# Wrangler configuration for APEX Research Agent Cloudflare Pages proxy
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
# ---------------------------------------------------------------------------

name = "apex-research-proxy"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Environment variables (secrets should be set via dashboard, not here)
# ---------------------------------------------------------------------------

[vars]
APEX_API_URL = "https://apex-research-agent-production.up.railway.app"

# ---------------------------------------------------------------------------
# Routing — only /research/* is handled by Pages Functions;
# everything else serves static assets.
# ---------------------------------------------------------------------------

[[routes]]
pattern = "/research/*"
custom_domain = "kovira.pages.dev"
