    description: "24B model with vision support. Best for complex multi-source synthesis."

  # ── Tier 9: Cloudflare Llama 3.3 70B FP8 Fast ──
  - name: "Llama-3.3-70B"
    provider: "cloudflare"
    model_id: "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
