  # ── Tier 8: Cloudflare Mistral Small 3.1 24B ──
  - name: "Mistral-Small-3.1-24B"
    provider: "cloudflare"
    model_id: "@cf/mistralai/mistral-small-3.1-24b-instruct"
    context_window: 128000
