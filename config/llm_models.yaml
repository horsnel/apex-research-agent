tier_selection:
  # Similarity-based routing
  high_confidence:
    threshold: 0.85
    models: ["pass-through"]
    description: "Direct quote from source. Zero LLM cost."

  medium_confidence:
    threshold_min: 0.72
    threshold_max: 0.85
    models: ["Granite-4.0-Micro", "Llama-3.2-1B", "GLM-4.7-Flash", "Llama-3.2-3B", "Qwen3-30B-MoE"]
    description: "Cheap Cloudflare models for medium-difficulty synthesis."

  low_confidence:
    threshold_max: 0.72
    models: "all"  # Use entire fallback chain
    description: "Full 9-model chain including 70B for hardest queries."

  # Task-based routing
  classification:
    models: ["Granite-4.0-Micro", "Llama-3.2-1B", "GLM-4.7-Flash"]
    description: "Cheapest models for query classification (3-model subset)."

  table_queries:
    models: ["Qwen3-30B-MoE", "Llama-3.1-8B", "Mistral-Small-3.1-24B", "Llama-3.3-70B"]
    description: "Mid+ capable models for table format generation."

cost_estimate:
  # Based on 30,000 queries/month
  # ~60% pass-through, ~25% cheap models, ~10% mid, ~5% capable
  queries_per_month: 30000
  distribution:
    pass_through: 0.60    # 18,000 queries - $0
    cheap_models: 0.25    # 7,500 queries  - ~$0.50
    mid_models: 0.10      # 3,000 queries  - ~$1.50
    capable_models: 0.05  # 1,500 queries  - ~$2.00
  estimated_monthly_cost_usd: 4.00
  notes: "Conservative estimate. Actual cost likely lower due to pass-through optimization."

latency_benchmark:
  # Real latency measurements from live API tests (June 2026)
  # Simple "Hi" prompt, max_tokens=5, single request
  Granite-4.0-Micro:
    avg_latency_ms: 509
    p50_ms: 500
    notes: "Fastest classification model. Good for routing."
  Llama-3.2-1B:
    avg_latency_ms: 800
    p50_ms: 780
    notes: "1B is slower than expected. Granite preferred for cheap tier."
  GLM-4.7-Flash:
    avg_latency_ms: 388
    p50_ms: 380
    notes: "Fastest model overall! Best price/performance ratio."
  Llama-3.2-3B:
    avg_latency_ms: 713
    p50_ms: 700
    notes: "Decent for synthesis when Granite is insufficient."
  Qwen3-30B-MoE:
    avg_latency_ms: 667
    p50_ms: 650
    notes: "Excellent for tables. MoE keeps latency low despite 30B size."
  Llama-3.1-8B:
    avg_latency_ms: 604
    p50_ms: 590
    notes: "Reliable mid-tier. Good for complex synthesis."
  Mistral-Small-3.1-24B:
    avg_latency_ms: 438
    p50_ms: 430
    notes: "Surprisingly fast for 24B. Best for multi-source synthesis."
  Llama-3.3-70B:
    avg_latency_ms: 497
    p50_ms: 480
    notes: "70B with FP8 fast is sub-500ms! Final fallback quality."
  summary: "All 8 Cloudflare models respond in under 1 second. GLM-4.7-Flash is fastest at 388ms."
